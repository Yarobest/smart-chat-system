services:
  - type: web
    name: smart-chat-system-api
    env: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api run prisma:generate && pnpm --filter api run build
    startCommand: pnpm --filter api run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
